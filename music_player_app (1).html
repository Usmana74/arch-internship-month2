<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aether — Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #0a0a0f;
  --bg2:     #111118;
  --bg3:     #1a1a24;
  --bg4:     #22222e;
  --border:  rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.11);
  --text:    #f0eeea;
  --muted:   #6a6878;
  --accent:  #c4a882;
  --accent2: #8fa4d4;
  --mono:    'DM Mono', monospace;
  --serif:   'Playfair Display', serif;
  --radius:  6px;
  --trans:   0.18s ease;
}

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  min-height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── LAYOUT ─────────────────────────────────────── */
#app {
  display: grid;
  grid-template-columns: 264px 1fr;
  grid-template-rows: 1fr 80px;
  height: 100vh;
}

/* ── SIDEBAR ─────────────────────────────────────── */
.sidebar {
  grid-row: 1 / 3;
  background: var(--bg2);
  border-right: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.sidebar-header {
  padding: 22px 20px 14px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}

.logo {
  font-family: var(--serif);
  font-size: 21px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.4px;
}
.logo-sub {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 300;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 2px;
}

.search-wrap {
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 28px;
  top: 50%;
  transform: translateY(-50%);
  width: 13px; height: 13px;
  stroke: var(--muted);
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  pointer-events: none;
}
#searchInput {
  width: 100%;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  padding: 8px 10px 8px 32px;
  border-radius: var(--radius);
  outline: none;
  transition: border-color var(--trans);
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--muted); }

.section-label {
  padding: 12px 20px 5px;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  flex-shrink: 0;
}

.cat-list {
  padding: 0 12px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}

.cat-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 6px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--muted);
  font-size: 12px;
  transition: all var(--trans);
}
.cat-item:hover { background: var(--bg3); color: var(--text); }
.cat-item.active { background: var(--bg3); color: var(--accent); }
.cat-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.cat-count { margin-left: auto; font-size: 10px; opacity: 0.5; }

.playlist-section {
  flex: 1;
  overflow-y: auto;
  padding-bottom: 8px;
}
.playlist-section::-webkit-scrollbar { width: 3px; }
.playlist-section::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

.track-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 20px 8px 16px;
  cursor: pointer;
  transition: background var(--trans);
  border-left: 2px solid transparent;
  position: relative;
}
.track-item:hover { background: var(--bg3); }
.track-item.active { background: var(--bg3); border-left-color: var(--accent); }
.track-item:hover .fav-btn { opacity: 1; }

.track-idx { color: var(--muted); font-size: 10px; min-width: 16px; text-align: right; flex-shrink: 0; }
.track-info { flex: 1; overflow: hidden; }
.track-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 10px; color: var(--muted); margin-top: 2px; }
.track-item.active .track-name { color: var(--accent); }
.track-dur { color: var(--muted); font-size: 10px; flex-shrink: 0; }

.fav-btn {
  opacity: 0;
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 2px;
  transition: all var(--trans);
  flex-shrink: 0;
  line-height: 1;
  font-size: 13px;
}
.fav-btn.faved { opacity: 1; color: #e87a7a; }
.fav-btn:hover { color: #e87a7a; }

.playing-anim {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 14px;
  flex-shrink: 0;
}
.playing-bar {
  width: 3px;
  border-radius: 1px;
  background: var(--accent);
  animation: pb 0.7s ease-in-out infinite alternate;
}
.playing-bar:nth-child(2) { animation-delay: 0.2s; }
.playing-bar:nth-child(3) { animation-delay: 0.1s; }
@keyframes pb { from { height: 3px; } to { height: 14px; } }
.paused-anim .playing-bar { animation-play-state: paused; }

/* ── MAIN ─────────────────────────────────────── */
.main-content {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

.ambient-bg {
  position: absolute;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.amb {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.07;
  transition: background 1.6s ease, transform 2s ease;
}
.amb1 { width: 500px; height: 500px; top: -160px; right: -120px; background: var(--accent); }
.amb2 { width: 360px; height: 360px; bottom: -120px; left: -60px; background: var(--accent2); }

.now-playing {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 48px 16px;
  position: relative;
  gap: 0;
}

/* Art */
.art-wrap {
  position: relative;
  width: 200px;
  height: 200px;
  margin-bottom: 24px;
  flex-shrink: 0;
}
.album-art {
  width: 100%;
  height: 100%;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 68px;
  transition: background 1s ease;
  position: relative;
  overflow: hidden;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}
.album-art::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(145deg, rgba(255,255,255,0.06) 0%, transparent 55%);
  border-radius: 8px;
}
.spin-ring {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px solid transparent;
  border-top-color: var(--accent);
  opacity: 0;
  transition: opacity 0.5s;
}
.spin-ring.spinning { opacity: 0.5; animation: spin 9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Meta */
.track-title-main {
  font-family: var(--serif);
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.4px;
  text-align: center;
  margin-bottom: 5px;
  max-width: 420px;
}
.track-artist-main {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 8px;
}
.badges {
  display: flex;
  gap: 6px;
  margin-bottom: 24px;
}
.badge {
  font-size: 9px;
  padding: 3px 10px;
  border-radius: 20px;
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.badge.genre { color: var(--accent); }
.badge.fav { color: #e87a7a; border-color: rgba(232,122,122,0.3); }

/* Progress */
.progress-section { width: 100%; max-width: 440px; }

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 7px;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: var(--border2);
  border-radius: 3px;
  cursor: pointer;
  margin-bottom: 22px;
  position: relative;
}
.progress-bar:hover { height: 5px; transition: height 0.1s; }
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  pointer-events: none;
  position: relative;
  transition: width 0.6s linear;
}
.progress-thumb {
  position: absolute;
  right: -6px;
  top: 50%;
  transform: translateY(-50%) scale(0);
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  transition: transform 0.15s;
}
.progress-bar:hover .progress-thumb { transform: translateY(-50%) scale(1); }

/* Controls */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  margin-bottom: 14px;
}

.ctrl-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--trans);
}
.ctrl-btn:hover { color: var(--text); background: var(--bg3); }
.ctrl-btn.active { color: var(--accent); }

.play-btn {
  width: 54px; height: 54px;
  border-radius: 50%;
  border: 1.5px solid var(--accent);
  background: none;
  color: var(--accent);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.play-btn:hover { background: var(--accent); color: var(--bg); transform: scale(1.04); }
.play-btn:active { transform: scale(0.96); }

/* Volume */
.vol-row {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--muted);
}
.vol-icon-btn {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  transition: color var(--trans);
  padding: 2px;
}
.vol-icon-btn:hover { color: var(--text); }
.vol-slider {
  -webkit-appearance: none;
  width: 100px; height: 3px;
  border-radius: 3px;
  outline: none;
  cursor: pointer;
  background: linear-gradient(to right, var(--accent) var(--vol, 75%), var(--border2) var(--vol, 75%));
}
.vol-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}
#volVal { min-width: 30px; font-size: 10px; }

/* ── BOTTOM BAR ─────────────────────────────────────── */
.player-bar {
  grid-column: 2;
  grid-row: 2;
  background: var(--bg2);
  border-top: 0.5px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  gap: 16px;
  height: 80px;
}

.bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 160px;
}
.bar-mini-art {
  width: 42px; height: 42px;
  border-radius: 4px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
  transition: background 0.8s;
}
.bar-track-name { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; }
.bar-track-artist { font-size: 10px; color: var(--muted); margin-top: 2px; }

.bar-center {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: var(--muted);
}

.bar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 160px;
  justify-content: flex-end;
}

/* Mood pills */
.mood-pills { display: flex; gap: 6px; }
.mood-pill {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 20px;
  border: 0.5px solid var(--border2);
  color: var(--muted);
  cursor: pointer;
  transition: all var(--trans);
  letter-spacing: 0.5px;
}
.mood-pill:hover, .mood-pill.active { border-color: var(--accent); color: var(--accent); }

/* EQ bars */
.eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 16px; }
.eq-bar { width: 3px; border-radius: 1px; background: var(--accent); opacity: 0.65; }
.eq-bar { animation: eq 0.8s ease-in-out infinite alternate; }
.eq-bar:nth-child(2) { animation-delay: 0.2s; }
.eq-bar:nth-child(3) { animation-delay: 0.07s; }
.eq-bar:nth-child(4) { animation-delay: 0.14s; }
@keyframes eq { from { height: 3px; } to { height: 14px; } }
.eq-bars.paused .eq-bar { animation-play-state: paused; }

/* Toast */
.toast {
  position: fixed;
  bottom: 96px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  color: var(--text);
  font-size: 11px;
  padding: 8px 16px;
  border-radius: 20px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 99;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Icons */
svg.icon { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* Tooltip */
[title] { position: relative; }

/* No-results */
.no-results { padding: 20px; text-align: center; color: var(--muted); font-size: 11px; line-height: 1.6; }

/* Keyboard hint */
.kb-hint {
  position: fixed;
  bottom: 90px;
  right: 20px;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 10px;
  color: var(--muted);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  line-height: 1.8;
  z-index: 50;
}
.kb-hint.visible { opacity: 1; }
.kb-hint kbd {
  background: var(--bg4);
  border: 0.5px solid var(--border2);
  border-radius: 3px;
  padding: 1px 5px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--accent);
}
</style>
</head>
<body>

<div id="app">

  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">Aether</div>
      <div class="logo-sub">music player</div>
    </div>

    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search tracks, artists…" oninput="applyFilters()" />
    </div>

    <div class="section-label">Genres</div>
    <div class="cat-list" id="catList"></div>

    <div class="section-label" style="margin-top:4px">Playlist</div>
    <div class="playlist-section">
      <div id="trackList"></div>
    </div>
  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="main-content">
    <div class="ambient-bg">
      <div class="amb amb1" id="amb1"></div>
      <div class="amb amb2" id="amb2"></div>
    </div>

    <div class="now-playing">

      <!-- Album Art -->
      <div class="art-wrap" id="artWrap">
        <div class="album-art" id="albumArt">
          <span id="artEmoji">🎵</span>
        </div>
        <div class="spin-ring" id="spinRing"></div>
      </div>

      <!-- Track info -->
      <div class="track-title-main" id="nowTitle">Select a track</div>
      <div class="track-artist-main" id="nowArtist">—</div>
      <div class="badges">
        <div class="badge genre" id="nowGenre">—</div>
        <div class="badge fav" id="favBadge" style="display:none">♥ Favourite</div>
      </div>

      <!-- Progress -->
      <div class="progress-section">
        <div class="time-row">
          <span id="curTime">0:00</span>
          <span id="totTime">—</span>
        </div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill" style="width:0%">
            <div class="progress-thumb"></div>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls-row">
          <button class="ctrl-btn" id="shuffleBtn" title="Shuffle (S)" onclick="toggleShuffle()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M16 3h5v5M4 20l16-16M16 20h5v-5M4 4l6 6M14 14l6 6"/></svg>
          </button>
          <button class="ctrl-btn" title="Previous (←)" onclick="prevTrack()">
            <svg class="icon" viewBox="0 0 24 24"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg>
          </button>
          <button class="play-btn" id="playBtn" title="Play/Pause (Space)" onclick="togglePlay()">
            <svg class="icon" id="playIcon" viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;stroke:none"><polygon points="5,3 19,12 5,21"/></svg>
          </button>
          <button class="ctrl-btn" title="Next (→)" onclick="nextTrack()">
            <svg class="icon" viewBox="0 0 24 24"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg>
          </button>
          <button class="ctrl-btn" id="loopBtn" title="Repeat (R)" onclick="toggleLoop()">
            <svg class="icon" viewBox="0 0 24 24"><polyline points="17,1 21,5 17,9"/><path d="M3,11V9a4,4,0,0,1,4-4H21"/><polyline points="7,23 3,19 7,15"/><path d="M21,13v2a4,4,0,0,1-4,4H3"/></svg>
          </button>
        </div>

        <!-- Volume -->
        <div class="vol-row" style="justify-content:center">
          <button class="vol-icon-btn" id="muteBtn" title="Mute (M)" onclick="toggleMute()">
            <svg class="icon" viewBox="0 0 24 24" id="volIcon" style="width:15px;height:15px">
              <polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
              <path d="M15.54,8.46a5,5,0,0,1,0,7.07"/>
              <path d="M19.07,4.93a10,10,0,0,1,0,14.14"/>
            </svg>
          </button>
          <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="75" oninput="setVolume(this.value)" />
          <span id="volVal">75%</span>
        </div>

      </div><!-- /progress-section -->
    </div><!-- /now-playing -->
  </main>

  <!-- ── BOTTOM BAR ── -->
  <div class="player-bar">
    <div class="bar-left">
      <div class="bar-mini-art" id="barArt">🎵</div>
      <div>
        <div class="bar-track-name" id="barTitle">—</div>
        <div class="bar-track-artist" id="barArtist">—</div>
      </div>
    </div>

    <div class="bar-center">
      <div class="mood-pills" id="moodPills"></div>
    </div>

    <div class="bar-right">
      Track <span id="queuePos" style="color:var(--accent);margin:0 2px">—</span> of <span id="queueTotal" style="color:var(--accent);margin:0 2px">—</span>
      <div class="eq-bars paused" id="eqBars">
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
        <div class="eq-bar"></div>
      </div>
    </div>
  </div>

</div><!-- /#app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Keyboard hint -->
<div class="kb-hint" id="kbHint">
  <kbd>Space</kbd> Play/Pause &nbsp; <kbd>←</kbd><kbd>→</kbd> Skip<br>
  <kbd>S</kbd> Shuffle &nbsp; <kbd>R</kbd> Repeat &nbsp; <kbd>M</kbd> Mute<br>
  <kbd>↑</kbd><kbd>↓</kbd> Volume &nbsp; <kbd>F</kbd> Favourite
</div>

<script>
/* ── DATA ─────────────────────────────────── */
const tracks = [
  { id:1,  title:"Neon Dusk",        artist:"Soft Circuit",    genre:"Ambient",    dur:214, emoji:"🌆", color:"#1a1a2e", accent:"#c4a882", accent2:"#a07040", mood:"Chill" },
  { id:2,  title:"Bossa Noite",      artist:"Clara Velez",     genre:"Jazz",       dur:187, emoji:"🎷", color:"#1a1424", accent:"#d48fa0", accent2:"#8f4060", mood:"Chill" },
  { id:3,  title:"Midnight Lattice", artist:"Koto Dreams",     genre:"Electronic", dur:263, emoji:"🔮", color:"#141420", accent:"#8fa4d4", accent2:"#3060a0", mood:"Focus" },
  { id:4,  title:"Desert Glass",     artist:"Arca Maeve",      genre:"Ambient",    dur:198, emoji:"🏜️",  color:"#1e1a14", accent:"#d4b882", accent2:"#a07830", mood:"Chill" },
  { id:5,  title:"Parallax",         artist:"VVAVE",           genre:"Electronic", dur:241, emoji:"⚡", color:"#121820", accent:"#80c4d4", accent2:"#207090", mood:"Energy" },
  { id:6,  title:"Rue des Lilas",    artist:"Margot Osei",     genre:"Jazz",       dur:195, emoji:"🌸", color:"#1c1418", accent:"#c498b4", accent2:"#805078", mood:"Chill" },
  { id:7,  title:"Hollow Earth",     artist:"Subsurface",      genre:"Rock",       dur:229, emoji:"🎸", color:"#141414", accent:"#c0b8a8", accent2:"#706858", mood:"Energy" },
  { id:8,  title:"Solstice Loop",    artist:"Bright Interval", genre:"Electronic", dur:257, emoji:"🌀", color:"#141820", accent:"#98c4b4", accent2:"#306854", mood:"Focus" },
  { id:9,  title:"Amber Fold",       artist:"Two Rooms",       genre:"Indie",      dur:203, emoji:"🍂", color:"#1c1810", accent:"#d4a870", accent2:"#906030", mood:"Chill" },
  { id:10, title:"Seven Palms",      artist:"Luca Serafini",   genre:"Indie",      dur:218, emoji:"🌴", color:"#101814", accent:"#98c898", accent2:"#306830", mood:"Energy" },
  { id:11, title:"Glass Harp",       artist:"Suki Wren",       genre:"Classical",  dur:246, emoji:"🎻", color:"#18141a", accent:"#c4b0d4", accent2:"#705880", mood:"Focus" },
  { id:12, title:"Ferro",            artist:"Tangents",        genre:"Rock",       dur:188, emoji:"🎵", color:"#181410", accent:"#c8a888", accent2:"#785838", mood:"Energy" },
];

const MOOD_MAP = {
  Chill:  t => ["Ambient","Jazz","Indie"].includes(t.genre) || t.mood === "Chill",
  Focus:  t => ["Classical","Electronic"].includes(t.genre) || t.mood === "Focus",
  Energy: t => ["Rock","Electronic","Indie"].includes(t.genre) || t.mood === "Energy",
};

/* ── STATE ─────────────────────────────────── */
let filtered    = [...tracks];
let current     = 0;
let playing     = false;
let shuffle     = false;
let loop        = false;
let progress    = 0;
let timer       = null;
let activeGenre = "All";
let activeMood  = "All";
let volume      = 75;
let muted       = false;
let favourites  = new Set();
let toastTimer  = null;
let seekDragging = false;

/* ── HELPERS ─────────────────────────────────── */
function fmt(s) {
  s = Math.floor(s);
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ── GENRES / CATEGORIES ─────────────────────── */
function renderCats() {
  const genres = ["All", ...new Set(tracks.map(t => t.genre))];
  document.getElementById('catList').innerHTML = genres.map(g => {
    const count = g === "All" ? tracks.length : tracks.filter(t => t.genre === g).length;
    return `<div class="cat-item ${g===activeGenre?'active':''}" onclick="setGenre('${g}')">
      <div class="cat-dot"></div>
      <span>${g}</span>
      <span class="cat-count">${count}</span>
    </div>`;
  }).join('');
}

function setGenre(g) {
  activeGenre = g;
  applyFilters();
  renderCats();
}

/* ── MOOD PILLS ─────────────────────────────── */
function renderMoodPills() {
  const moods = ["All","Chill","Focus","Energy"];
  document.getElementById('moodPills').innerHTML = moods.map(m =>
    `<div class="mood-pill ${m===activeMood?'active':''}" onclick="setMood('${m}')">${m}</div>`
  ).join('');
}

function setMood(m) {
  activeMood = m;
  applyFilters();
  renderMoodPills();
}

/* ── FILTERS ─────────────────────────────────── */
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filtered = tracks.filter(t => {
    const matchGenre = activeGenre === 'All' || t.genre === activeGenre;
    const matchMood  = activeMood === 'All' || (MOOD_MAP[activeMood] && MOOD_MAP[activeMood](t));
    const matchQ     = !q || t.title.toLowerCase().includes(q) || t.artist.toLowerCase().includes(q) || t.genre.toLowerCase().includes(q);
    return matchGenre && matchMood && matchQ;
  });
  renderList();
}

/* ── TRACK LIST ─────────────────────────────── */
function renderList() {
  const c = document.getElementById('trackList');
  if (!filtered.length) {
    c.innerHTML = `<div class="no-results">No tracks found<br><span style="opacity:0.5">Try a different search or filter</span></div>`;
    return;
  }
  c.innerHTML = filtered.map((t, i) => {
    const isActive = tracks[current] && tracks[current].id === t.id;
    const isFav    = favourites.has(t.id);
    const realIdx  = tracks.indexOf(t);
    return `<div class="track-item ${isActive?'active':''}" onclick="selectTrack(${realIdx})">
      ${isActive && playing
        ? `<div class="playing-anim ${playing?'':'paused-anim'}"><div class="playing-bar"></div><div class="playing-bar"></div><div class="playing-bar"></div></div>`
        : `<span class="track-idx">${i+1}</span>`}
      <div class="track-info">
        <div class="track-name">${t.title}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <span class="track-dur">${fmt(t.dur)}</span>
      <button class="fav-btn ${isFav?'faved':''}" onclick="toggleFav(event,${t.id})" title="Favourite">♥</button>
    </div>`;
  }).join('');
}

/* ── NOW PLAYING UPDATE ──────────────────────── */
function updateNowPlaying() {
  const t = tracks[current];
  document.getElementById('nowTitle').textContent   = t.title;
  document.getElementById('nowArtist').textContent  = t.artist.toUpperCase();
  document.getElementById('nowGenre').textContent   = t.genre;
  document.getElementById('artEmoji').textContent   = t.emoji;
  document.getElementById('albumArt').style.background = t.color;
  document.getElementById('totTime').textContent    = fmt(t.dur);
  document.getElementById('queuePos').textContent   = current + 1;
  document.getElementById('queueTotal').textContent = tracks.length;

  // Fav badge
  const fb = document.getElementById('favBadge');
  fb.style.display = favourites.has(t.id) ? '' : 'none';

  // Ambient colours
  document.documentElement.style.setProperty('--accent',  t.accent);
  document.documentElement.style.setProperty('--accent2', t.accent2);
  document.getElementById('amb1').style.background = t.accent;
  document.getElementById('amb2').style.background = t.accent2;

  // Mini bar
  document.getElementById('barArt').textContent    = t.emoji;
  document.getElementById('barArt').style.background = t.color;
  document.getElementById('barTitle').textContent  = t.title;
  document.getElementById('barArtist').textContent = t.artist;

  // Volume slider gradient
  updateVolSlider();

  renderList();
}

/* ── SELECT / PLAY ──────────────────────────── */
function selectTrack(idx) {
  current  = idx;
  progress = 0;
  updateNowPlaying();
  resetProgress();
  playing ? (clearInterval(timer), startTimer()) : startPlay();
}

function startPlay() {
  playing = true;
  document.getElementById('playIcon').outerHTML =
    `<svg class="icon" id="playIcon" viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;stroke:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
  document.getElementById('spinRing').classList.add('spinning');
  document.getElementById('eqBars').classList.remove('paused');
  startTimer();
}

function pausePlay() {
  playing = false;
  document.getElementById('playIcon').outerHTML =
    `<svg class="icon" id="playIcon" viewBox="0 0 24 24" style="width:20px;height:20px;fill:currentColor;stroke:none"><polygon points="5,3 19,12 5,21"/></svg>`;
  document.getElementById('spinRing').classList.remove('spinning');
  document.getElementById('eqBars').classList.add('paused');
  clearInterval(timer);
  renderList();
}

function togglePlay() {
  if (!playing) startPlay(); else pausePlay();
  renderList();
}

/* ── TIMER ──────────────────────────────────── */
function startTimer() {
  clearInterval(timer);
  const t = tracks[current];
  timer = setInterval(() => {
    if (seekDragging) return;
    progress++;
    if (progress >= t.dur) {
      if (loop) { progress = 0; }
      else { nextTrack(); return; }
    }
    updateProgressUI();
  }, 1000);
}

function updateProgressUI() {
  const t   = tracks[current];
  const pct = Math.min(100, (progress / t.dur) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('curTime').textContent       = fmt(progress);
}

function resetProgress() {
  progress = 0;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('curTime').textContent       = '0:00';
}

/* ── SEEK ───────────────────────────────────── */
(function setupSeek() {
  const bar = document.getElementById('progressBar');
  function seek(e) {
    const rect = bar.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const pct  = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    progress   = Math.floor(pct * tracks[current].dur);
    updateProgressUI();
  }
  bar.addEventListener('mousedown',  e => { seekDragging = true; seek(e); });
  bar.addEventListener('touchstart', e => { seekDragging = true; seek(e); }, { passive: true });
  document.addEventListener('mousemove', e => { if (seekDragging) seek(e); });
  document.addEventListener('touchmove', e => { if (seekDragging) seek(e); }, { passive: true });
  document.addEventListener('mouseup',   () => { seekDragging = false; });
  document.addEventListener('touchend',  () => { seekDragging = false; });
})();

/* ── NEXT / PREV ─────────────────────────────── */
function nextTrack() {
  if (shuffle) {
    let next;
    do { next = Math.floor(Math.random() * tracks.length); } while (next === current && tracks.length > 1);
    current = next;
  } else {
    current = (current + 1) % tracks.length;
  }
  progress = 0;
  updateNowPlaying();
  resetProgress();
  if (playing) { clearInterval(timer); startTimer(); }
}

function prevTrack() {
  if (progress > 3) {
    progress = 0;
    resetProgress();
    if (playing) { clearInterval(timer); startTimer(); }
    return;
  }
  current = (current - 1 + tracks.length) % tracks.length;
  progress = 0;
  updateNowPlaying();
  resetProgress();
  if (playing) { clearInterval(timer); startTimer(); }
}

/* ── SHUFFLE / LOOP ──────────────────────────── */
function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffleBtn').classList.toggle('active', shuffle);
  showToast(shuffle ? '🔀 Shuffle on' : 'Shuffle off');
}

function toggleLoop() {
  loop = !loop;
  document.getElementById('loopBtn').classList.toggle('active', loop);
  showToast(loop ? '🔁 Repeat on' : 'Repeat off');
}

/* ── VOLUME ──────────────────────────────────── */
function setVolume(v) {
  volume = parseInt(v);
  muted  = false;
  document.getElementById('volVal').textContent = volume + '%';
  updateVolSlider();
  updateVolIcon();
}

function toggleMute() {
  muted = !muted;
  document.getElementById('volSlider').value = muted ? 0 : volume;
  document.getElementById('volVal').textContent = muted ? '0%' : volume + '%';
  updateVolSlider();
  updateVolIcon();
  showToast(muted ? '🔇 Muted' : '🔊 Unmuted');
}

function updateVolSlider() {
  const eff = muted ? 0 : volume;
  document.getElementById('volSlider').style.setProperty('--vol', eff + '%');
}

function updateVolIcon() {
  const eff = muted ? 0 : volume;
  let path = '';
  if (eff === 0) {
    path = `<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`;
  } else if (eff < 40) {
    path = `<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54,8.46a5,5,0,0,1,0,7.07"/>`;
  } else {
    path = `<polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/>
            <path d="M15.54,8.46a5,5,0,0,1,0,7.07"/>
            <path d="M19.07,4.93a10,10,0,0,1,0,14.14"/>`;
  }
  document.getElementById('volIcon').innerHTML = path;
}

/* ── FAVOURITES ──────────────────────────────── */
function toggleFav(e, id) {
  e.stopPropagation();
  if (favourites.has(id)) {
    favourites.delete(id);
    showToast('Removed from favourites');
  } else {
    favourites.add(id);
    showToast('♥ Added to favourites');
  }
  // Update fav badge if it's the current track
  const fb = document.getElementById('favBadge');
  fb.style.display = favourites.has(tracks[current].id) ? '' : 'none';
  renderList();
}

/* ── KEYBOARD SHORTCUTS ──────────────────────── */
let kbTimer;
document.addEventListener('keydown', e => {
  // Don't fire when typing in search
  if (e.target === document.getElementById('searchInput')) return;

  const hint = document.getElementById('kbHint');
  hint.classList.add('visible');
  clearTimeout(kbTimer);
  kbTimer = setTimeout(() => hint.classList.remove('visible'), 2000);

  switch(e.code) {
    case 'Space':
      e.preventDefault();
      togglePlay();
      break;
    case 'ArrowRight':
      e.preventDefault();
      if (e.shiftKey) nextTrack();
      else {
        progress = Math.min(tracks[current].dur - 1, progress + 10);
        updateProgressUI();
      }
      break;
    case 'ArrowLeft':
      e.preventDefault();
      if (e.shiftKey) prevTrack();
      else {
        progress = Math.max(0, progress - 10);
        updateProgressUI();
      }
      break;
    case 'ArrowUp':
      e.preventDefault();
      volume = Math.min(100, volume + 5);
      document.getElementById('volSlider').value = volume;
      setVolume(volume);
      break;
    case 'ArrowDown':
      e.preventDefault();
      volume = Math.max(0, volume - 5);
      document.getElementById('volSlider').value = volume;
      setVolume(volume);
      break;
    case 'KeyS':
      toggleShuffle();
      break;
    case 'KeyR':
      toggleLoop();
      break;
    case 'KeyM':
      toggleMute();
      break;
    case 'KeyF':
      toggleFav({ stopPropagation: ()=>{} }, tracks[current].id);
      break;
  }
});

/* ── INIT ────────────────────────────────────── */
renderCats();
renderMoodPills();
applyFilters();
updateNowPlaying();
updateVolIcon();
</script>
</body>
</html>
